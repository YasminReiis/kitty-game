<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitty Run 💖</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(#ffeef5, #fff);
    font-family: Arial;
    text-align: center;
  }

  canvas {
    background: #fff;
    display: block;
    margin: auto;
    border-bottom: 4px solid #ff69b4;
  }

  #score {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 18px;
    color: #ff1493;
  }

  #jumpBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #ff69b4;
    color: white;
    font-size: 18px;
    border: none;
  }

  #jumpBtn:active {
    background: #ff1493;
  }
</style>
</head>

<body>

<div id="score">0</div>
<canvas id="game"></canvas>
<button id="jumpBtn">Pular</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = 250;
}
resize();
window.addEventListener("resize", resize);

let kitty = {
  x: 80,
  y: 180,
  width: 40,
  height: 40,
  dy: 0,
  gravity: 0.7,
  jumpForce: -14,
  grounded: true
};

let obstacles = [];
let clouds = [];
let score = 0;
let speed = 4;
let gameOver = false;

// EFEITO
let showLove = false;
let glowSize = 0;

// PULO
function jump() {
  if (kitty.grounded) {
    kitty.dy = kitty.jumpForce;
    kitty.grounded = false;
  } else if (gameOver) {
    resetGame();
  }
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") jump();
});

document.getElementById("jumpBtn").addEventListener("touchstart", jump);
document.getElementById("jumpBtn").addEventListener("click", jump);

// UPDATE
function update() {
  if (gameOver) return;

  kitty.dy += kitty.gravity;
  kitty.y += kitty.dy;

  if (kitty.y >= 180) {
    kitty.y = 180;
    kitty.dy = 0;
    kitty.grounded = true;
  }

  if (Math.random() < 0.015) {
    obstacles.push({
      x: canvas.width,
      y: 190,
      width: 25,
      height: 35
    });
  }

  obstacles.forEach(obs => {
    obs.x -= speed;

    if (
      kitty.x < obs.x + obs.width &&
      kitty.x + kitty.width > obs.x &&
      kitty.y < obs.y + obs.height &&
      kitty.y + kitty.height > obs.y
    ) {
      gameOver = true;
    }
  });

  obstacles = obstacles.filter(o => o.x > -50);

  if (Math.random() < 0.01) {
    clouds.push({
      x: canvas.width,
      y: Math.random() * 100 + 20,
      size: Math.random() * 20 + 20
    });
  }

  clouds.forEach(c => c.x -= 1);
  clouds = clouds.filter(c => c.x > -50);

  score++;

  // ATIVA MENSAGEM
  if (score >= 1000) {
    showLove = true;
  }

  if (score % 500 === 0) speed += 0.5;

  document.getElementById("score").innerText = score;
}

// DESENHO GATINHA
function drawKitty() {
  ctx.fillStyle = "#fff";
  ctx.strokeStyle = "#000";
  ctx.lineWidth = 2;

  ctx.fillRect(kitty.x, kitty.y, kitty.width, kitty.height);
  ctx.strokeRect(kitty.x, kitty.y, kitty.width, kitty.height);

  ctx.fillStyle = "#000";
  ctx.fillRect(kitty.x + 10, kitty.y + 10, 5, 5);
  ctx.fillRect(kitty.x + 25, kitty.y + 10, 5, 5);

  ctx.fillStyle = "#ff69b4";
  ctx.fillRect(kitty.x + 18, kitty.y + 18, 6, 4);
}

// DESENHO
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // nuvens
  ctx.fillStyle = "#eee";
  clouds.forEach(c => {
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2);
    ctx.fill();
  });

  // chão
  ctx.fillStyle = "#ffb6c1";
  ctx.fillRect(0, 220, canvas.width, 5);

  drawKitty();

  // obstáculos
  ctx.fillStyle = "#ff1493";
  obstacles.forEach(obs => {
    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
  });

  // 💖 EFEITO BRILHO
  if (showLove) {
    glowSize += 0.5;

    ctx.save();
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = "pink";

    ctx.beginPath();
    ctx.arc(canvas.width/2, 80, glowSize, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    ctx.fillStyle = "#ff1493";
    ctx.font = "32px Arial";
    ctx.fillText("Ana te amo 💖", canvas.width/2 - 110, 90);
  }

  if (gameOver) {
    ctx.fillStyle = "#ff1493";
    ctx.font = "20px Arial";
    ctx.fillText("Toque ou aperte para reiniciar 💖", 50, 120);
  }
}

// LOOP
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function resetGame() {
  obstacles = [];
  clouds = [];
  score = 0;
  speed = 4;
  gameOver = false;
  showLove = false;
  glowSize = 0;
}

loop();
</script>

</body>
</html>

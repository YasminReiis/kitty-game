<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitty Run 💖</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
  }

  canvas {
    display: none;
    background: #fff;
  }

  #menu, #finalScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(#ffb6c1, #ffeef5);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  #finalScreen {
    display: none;
    text-align: center;
  }

  h1 {
    color: #ff1493;
  }

  p {
    color: #ff69b4;
  }

  button {
    padding: 15px 30px;
    border: none;
    border-radius: 30px;
    background: #ff1493;
    color: white;
    font-size: 18px;
    margin-top: 20px;
  }

  #score, #record, #word, #jumpBtn {
    display: none;
  }

  #score { position: absolute; top: 10px; right: 15px; }
  #record { position: absolute; top: 30px; right: 15px; }
  #word { position: absolute; top: 10px; left: 20px; font-weight: bold; }

  #jumpBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #ff69b4;
    color: white;
  }
</style>
</head>

<body>

<div id="menu">
  <h1>🐱 Kitty Run 💖</h1>
  <p>pra minha princesa linda 💖</p>
  <button id="startBtn">Jogar</button>
</div>

<div id="finalScreen">
  <h1>💖 Ana, eu te amo 💖</h1>
  <p>você é a melhor coisa da minha vida</p>
  <button onclick="location.reload()">Jogar de novo</button>
</div>

<div id="score">0</div>
<div id="record">Record: 0</div>
<div id="word"></div>

<canvas id="game"></canvas>
<button id="jumpBtn">Pular</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 🎵 música
const music = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3");
music.loop = true;

// 🎉 som final
const finalSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

// iniciar
document.getElementById("startBtn").onclick = () => {
  document.getElementById("menu").style.display = "none";
  canvas.style.display = "block";
  document.getElementById("score").style.display = "block";
  document.getElementById("record").style.display = "block";
  document.getElementById("word").style.display = "block";
  document.getElementById("jumpBtn").style.display = "block";
  music.play().catch(()=>{});
};

// resize
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = 250;
}
resize();
window.addEventListener("resize", resize);

// record
let record = localStorage.getItem("kittyRecord") || 0;
document.getElementById("record").innerText = "Record: " + record;

// player
let kitty = {
  x: 80,
  y: 180,
  width: 40,
  height: 40,
  dy: 0,
  gravity: 0.7,
  jumpForce: -14,
  grounded: true
};

let obstacles = [];
let score = 0;
let gameOver = false;
let obstacleTimer = 0;

// 💖 FRASE
let message = "ANA EU TE AMO SUA GOSTOSA";
let currentText = "";
let nextLetterIndex = 0;
let nextMilestone = 300;

let flyingLetters = [];

// 💖 CORAÇÕES
let hearts = [];

// pulo
function jump() {
  if (kitty.grounded) {
    kitty.dy = kitty.jumpForce;
    kitty.grounded = false;
  } else if (gameOver) {
    resetGame();
  }
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") jump();
});
document.getElementById("jumpBtn").onclick = jump;

// update
function update() {
  if (gameOver) return;

  kitty.dy += kitty.gravity;
  kitty.y += kitty.dy;

  if (kitty.y >= 180) {
    kitty.y = 180;
    kitty.dy = 0;
    kitty.grounded = true;
  }

  obstacleTimer++;
  if (obstacleTimer > 120) {
    obstacles.push({ x: canvas.width, y: 190, width: 25, height: 35 });
    obstacleTimer = 0;
  }

  obstacles.forEach(obs => {
    obs.x -= 4;

    if (
      kitty.x < obs.x + obs.width &&
      kitty.x + kitty.width > obs.x &&
      kitty.y < obs.y + obs.height &&
      kitty.y + kitty.height > obs.y
    ) {
      gameOver = true;
    }
  });

  obstacles = obstacles.filter(o => o.x > -50);

  score++;

  // letras
  if (score >= nextMilestone && nextLetterIndex < message.length) {
    flyingLetters.push({
      letter: message[nextLetterIndex],
      x: canvas.width / 2,
      y: canvas.height / 2,
      targetX: 20 + (nextLetterIndex * 15),
      targetY: 25,
      done: false
    });

    nextLetterIndex++;
    nextMilestone += 200;
  }

  flyingLetters.forEach(l => {
    if (!l.done) {
      l.x += (l.targetX - l.x) * 0.1;
      l.y += (l.targetY - l.y) * 0.1;

      if (Math.abs(l.x - l.targetX) < 2) {
        currentText += l.letter;
        document.getElementById("word").innerText = currentText;
        l.done = true;
      }
    }
  });

  flyingLetters = flyingLetters.filter(l => !l.done);

  document.getElementById("score").innerText = score;

  // 💖 FINAL
  if (currentText === message) {
    gameOver = true;
    showFinal();
  }
}

// 💖 FINAL
function showFinal() {
  music.pause();
  finalSound.play();

  document.getElementById("finalScreen").style.display = "flex";

  // corações subindo
  setInterval(() => {
    hearts.push({
      x: Math.random() * window.innerWidth,
      y: window.innerHeight,
      size: 20 + Math.random() * 20
    });
  }, 200);

  animateHearts();
}

function animateHearts() {
  const screen = document.getElementById("finalScreen");

  hearts.forEach(h => {
    h.y -= 2;
    let heart = document.createElement("div");
    heart.innerText = "💖";
    heart.style.position = "absolute";
    heart.style.left = h.x + "px";
    heart.style.top = h.y + "px";
    heart.style.fontSize = h.size + "px";
    screen.appendChild(heart);
  });

  requestAnimationFrame(animateHearts);
}

// draw
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#ffb6c1";
  ctx.fillRect(0, 220, canvas.width, 5);

  ctx.fillStyle = "#fff";
  ctx.fillRect(kitty.x, kitty.y, 40, 40);

  ctx.fillStyle = "#ff1493";
  obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.width, o.height));
}

// loop
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function resetGame() {
  obstacles = [];
  score = 0;
  gameOver = false;
  currentText = "";
  nextLetterIndex = 0;
  nextMilestone = 300;
}

loop();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Kitty Run 🐱</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #ffeef5;
    font-family: Arial;
  }

  canvas {
    display: block;
    margin: auto;
    background: #fff;
    border-bottom: 3px solid #ff69b4;
  }

  #score {
    position: absolute;
    top: 10px;
    right: 20px;
    font-size: 20px;
    color: #ff1493;
  }
</style>
</head>
<body>

<div id="score">0</div>
<canvas id="game" width="800" height="200"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let kitty = {
  x: 50,
  y: 140,
  width: 40,
  height: 40,
  dy: 0,
  gravity: 0.6,
  jumpForce: -12,
  grounded: true
};

let obstacles = [];
let score = 0;
let gameSpeed = 5;
let gameOver = false;

// CONTROLES
document.addEventListener("keydown", e => {
  if (e.code === "Space" && kitty.grounded) {
    kitty.dy = kitty.jumpForce;
    kitty.grounded = false;
  }

  if (gameOver && e.code === "Space") {
    resetGame();
  }
});

// UPDATE
function update() {
  if (gameOver) return;

  kitty.dy += kitty.gravity;
  kitty.y += kitty.dy;

  if (kitty.y >= 140) {
    kitty.y = 140;
    kitty.dy = 0;
    kitty.grounded = true;
  }

  // Obstáculos
  if (Math.random() < 0.02) {
    obstacles.push({
      x: canvas.width,
      y: 150,
      width: 20,
      height: 30
    });
  }

  obstacles.forEach(obs => {
    obs.x -= gameSpeed;

    if (
      kitty.x < obs.x + obs.width &&
      kitty.x + kitty.width > obs.x &&
      kitty.y < obs.y + obs.height &&
      kitty.y + kitty.height > obs.y
    ) {
      gameOver = true;
    }
  });

  obstacles = obstacles.filter(o => o.x + o.width > 0);

  score++;
  document.getElementById("score").innerText = score;
}

// DESENHO
function drawKitty() {
  // Corpo
  ctx.fillStyle = "#fff";
  ctx.fillRect(kitty.x, kitty.y, kitty.width, kitty.height);

  // Olhos
  ctx.fillStyle = "#000";
  ctx.fillRect(kitty.x + 10, kitty.y + 10, 5, 5);
  ctx.fillRect(kitty.x + 25, kitty.y + 10, 5, 5);

  // Nariz
  ctx.fillStyle = "#ff69b4";
  ctx.fillRect(kitty.x + 18, kitty.y + 18, 6, 4);

  // Orelhas
  ctx.fillStyle = "#fff";
  ctx.fillRect(kitty.x - 5, kitty.y - 5, 10, 10);
  ctx.fillRect(kitty.x + 30, kitty.y - 5, 10, 10);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Kitty
  drawKitty();

  // Obstáculos (doces 🍬)
  ctx.fillStyle = "#ff69b4";
  obstacles.forEach(obs => {
    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
  });

  if (gameOver) {
    ctx.fillStyle = "#ff1493";
    ctx.font = "20px Arial";
    ctx.fillText("Game Over! Aperte espaço", 250, 100);
  }
}

// LOOP
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

function resetGame() {
  obstacles = [];
  score = 0;
  gameOver = false;
}

gameLoop();
</script>

</body>
</html>

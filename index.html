<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitty Run 💖</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
  }

  canvas {
    display: none;
    background: #fff;
  }

  #menu {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(#ffb6c1, #ffeef5);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  #menu h1 {
    color: #ff1493;
    font-size: 40px;
  }

  #menu p {
    color: #ff69b4;
    font-size: 14px;
  }

  #startBtn {
    padding: 15px 30px;
    border: none;
    border-radius: 30px;
    background: #ff1493;
    color: white;
    font-size: 18px;
    margin-top: 20px;
  }

  #score, #record, #word, #jumpBtn {
    display: none;
  }

  #score { position: absolute; top: 10px; right: 15px; color: #ff1493; }
  #record { position: absolute; top: 30px; right: 15px; color: #ff69b4; }
  #word { position: absolute; top: 10px; left: 20px; color: #ff1493; font-weight: bold; }

  #jumpBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #ff69b4;
    color: white;
    border: none;
  }
</style>
</head>

<body>

<div id="menu">
  <h1>🐱 Kitty Run 💖</h1>
  <p>pra minha princesa linda 💖</p>
  <button id="startBtn">Jogar</button>
</div>

<div id="score">0</div>
<div id="record">Record: 0</div>
<div id="word"></div>

<canvas id="game"></canvas>
<button id="jumpBtn">Pular</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 🎵 MUSICA (agora funciona)
const music = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=cute-11254.mp3");
music.loop = true;

// iniciar jogo + tocar música
document.getElementById("startBtn").onclick = () => {
  document.getElementById("menu").style.display = "none";
  canvas.style.display = "block";
  document.getElementById("score").style.display = "block";
  document.getElementById("record").style.display = "block";
  document.getElementById("word").style.display = "block";
  document.getElementById("jumpBtn").style.display = "block";

  music.play().catch(()=>{}); // 🔥 garante que toca
};

// resize
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = 250;
}
resize();
window.addEventListener("resize", resize);

// record
let record = localStorage.getItem("kittyRecord") || 0;
document.getElementById("record").innerText = "Record: " + record;

// player
let kitty = {
  x: 80,
  y: 180,
  width: 40,
  height: 40,
  dy: 0,
  gravity: 0.7,
  jumpForce: -14,
  grounded: true
};

let obstacles = [];
let score = 0;
let gameOver = false;
let obstacleTimer = 0;
let minDistance = 120;

// frase
let message = "ANA EU TE AMO SUA GOSTOSA";
let currentText = "";
let nextLetterIndex = 0;
let nextMilestone = 300;

let flyingLetters = [];

// som letra
const sound = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");

function jump() {
  if (kitty.grounded) {
    kitty.dy = kitty.jumpForce;
    kitty.grounded = false;
  } else if (gameOver) {
    resetGame();
  }
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") jump();
});

document.getElementById("jumpBtn").addEventListener("click", jump);
document.getElementById("jumpBtn").addEventListener("touchstart", jump);

// update
function update() {
  if (gameOver) return;

  kitty.dy += kitty.gravity;
  kitty.y += kitty.dy;

  if (kitty.y >= 180) {
    kitty.y = 180;
    kitty.dy = 0;
    kitty.grounded = true;
  }

  obstacleTimer++;
  if (obstacleTimer > minDistance) {
    obstacles.push({
      x: canvas.width,
      y: 190,
      width: 25,
      height: 35
    });
    obstacleTimer = 0;
  }

  obstacles.forEach(obs => {
    obs.x -= 4;

    if (
      kitty.x < obs.x + obs.width &&
      kitty.x + kitty.width > obs.x &&
      kitty.y < obs.y + obs.height &&
      kitty.y + kitty.height > obs.y
    ) {
      gameOver = true;
    }
  });

  obstacles = obstacles.filter(o => o.x > -50);

  score++;

  if (score > record) {
    record = score;
    localStorage.setItem("kittyRecord", record);
    document.getElementById("record").innerText = "Record: " + record;
  }

  // LETRAS SEM BUG
  if (score >= nextMilestone && nextLetterIndex < message.length) {
    let letter = message[nextLetterIndex];

    flyingLetters.push({
      letter,
      x: canvas.width / 2,
      y: canvas.height / 2,
      targetX: 20 + (nextLetterIndex * 15),
      targetY: 25,
      size: 30,
      done: false
    });

    sound.currentTime = 0;
    sound.play();

    nextLetterIndex++;
    nextMilestone += 200;
  }

  flyingLetters.forEach(l => {
    if (!l.done) {
      l.x += (l.targetX - l.x) * 0.12;
      l.y += (l.targetY - l.y) * 0.12;

      if (Math.abs(l.x - l.targetX) < 2) {
        currentText += l.letter;
        document.getElementById("word").innerText = currentText;
        l.done = true;
      }
    }
  });

  flyingLetters = flyingLetters.filter(l => !l.done);

  document.getElementById("score").innerText = score;
}

// draw
function drawKitty() {
  ctx.fillStyle = "#fff";
  ctx.strokeStyle = "#000";

  ctx.fillRect(kitty.x, kitty.y, kitty.width, kitty.height);
  ctx.strokeRect(kitty.x, kitty.y, kitty.width, kitty.height);

  ctx.fillStyle = "#000";
  ctx.fillRect(kitty.x + 10, kitty.y + 10, 5, 5);
  ctx.fillRect(kitty.x + 25, kitty.y + 10, 5, 5);

  ctx.fillStyle = "#ff69b4";
  ctx.fillRect(kitty.x + 18, kitty.y + 18, 6, 4);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#ffb6c1";
  ctx.fillRect(0, 220, canvas.width, 5);

  drawKitty();

  ctx.fillStyle = "#ff1493";
  obstacles.forEach(obs => {
    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
  });

  // letras sem sombra
  flyingLetters.forEach(l => {
    ctx.fillStyle = "#ff69b4";
    ctx.font = "28px Arial";
    ctx.fillText(l.letter, l.x, l.y);
  });

  if (gameOver) {
    ctx.fillStyle = "#ff1493";
    ctx.fillText("Toque para reiniciar 💖", 50, 120);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function resetGame() {
  obstacles = [];
  score = 0;
  gameOver = false;
  currentText = "";
  nextLetterIndex = 0;
  nextMilestone = 300;
  flyingLetters = [];
}

loop();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitty Run 💖</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(#ffeef5, #fff);
    font-family: Arial;
  }

  canvas {
    display: block;
    margin: auto;
    background: #fff;
    border-bottom: 4px solid #ff69b4;
  }

  #score {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 18px;
    color: #ff1493;
  }

  #word {
    position: absolute;
    top: 10px;
    left: 20px;
    font-size: 20px;
    color: #ff1493;
    font-weight: bold;
  }

  #jumpBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #ff69b4;
    color: white;
    border: none;
  }
</style>
</head>

<body>

<div id="score">0</div>
<div id="word"></div>
<canvas id="game"></canvas>
<button id="jumpBtn">Pular</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = 250;
}
resize();
window.addEventListener("resize", resize);

let kitty = {
  x: 80,
  y: 180,
  width: 40,
  height: 40,
  dy: 0,
  gravity: 0.7,
  jumpForce: -14,
  grounded: true
};

let obstacles = [];
let score = 0;
let gameOver = false;

let obstacleTimer = 0;
let minDistance = 120;

// 💖 PALAVRAS
let message = "ANA EU TE AMOGOSTOSA";
let currentText = "";
let nextLetterIndex = 0;
let nextMilestone = 300; // começa no 300

function jump() {
  if (kitty.grounded) {
    kitty.dy = kitty.jumpForce;
    kitty.grounded = false;
  } else if (gameOver) {
    resetGame();
  }
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") jump();
});

document.getElementById("jumpBtn").addEventListener("click", jump);
document.getElementById("jumpBtn").addEventListener("touchstart", jump);

// UPDATE
function update() {
  if (gameOver) return;

  kitty.dy += kitty.gravity;
  kitty.y += kitty.dy;

  if (kitty.y >= 180) {
    kitty.y = 180;
    kitty.dy = 0;
    kitty.grounded = true;
  }

  obstacleTimer++;
  if (obstacleTimer > minDistance) {
    obstacles.push({
      x: canvas.width,
      y: 190,
      width: 25,
      height: 35
    });
    obstacleTimer = 0;
  }

  obstacles.forEach(obs => {
    obs.x -= 4;

    if (
      kitty.x < obs.x + obs.width &&
      kitty.x + kitty.width > obs.x &&
      kitty.y < obs.y + obs.height &&
      kitty.y + kitty.height > obs.y
    ) {
      gameOver = true;
    }
  });

  obstacles = obstacles.filter(o => o.x > -50);

  score++;

  // 💖 LIBERAR LETRAS
  if (score >= nextMilestone && nextLetterIndex < message.length) {
    currentText += message[nextLetterIndex];
    nextLetterIndex++;
    nextMilestone += 200; // próximo a cada 200 pontos
  }

  document.getElementById("score").innerText = score;
  document.getElementById("word").innerText = currentText;
}

// DESENHO
function drawKitty() {
  ctx.fillStyle = "#fff";
  ctx.strokeStyle = "#000";
  ctx.lineWidth = 2;

  ctx.fillRect(kitty.x, kitty.y, kitty.width, kitty.height);
  ctx.strokeRect(kitty.x, kitty.y, kitty.width, kitty.height);

  ctx.fillStyle = "#000";
  ctx.fillRect(kitty.x + 10, kitty.y + 10, 5, 5);
  ctx.fillRect(kitty.x + 25, kitty.y + 10, 5, 5);

  ctx.fillStyle = "#ff69b4";
  ctx.fillRect(kitty.x + 18, kitty.y + 18, 6, 4);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#ffb6c1";
  ctx.fillRect(0, 220, canvas.width, 5);

  drawKitty();

  ctx.fillStyle = "#ff1493";
  obstacles.forEach(obs => {
    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
  });

  if (gameOver) {
    ctx.fillStyle = "#ff1493";
    ctx.font = "20px Arial";
    ctx.fillText("Toque para reiniciar 💖", 50, 120);
  }
}

// LOOP
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function resetGame() {
  obstacles = [];
  score = 0;
  gameOver = false;
  currentText = "";
  nextLetterIndex = 0;
  nextMilestone = 300;
}

loop();
</script>

</body>
</html>
